<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>P01 · Cover</title>
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .cover{padding:88px 120px 80px;}
  .cover-body{flex:1;display:flex;flex-direction:column;justify-content:center;}
  .cover .kicker{margin-bottom:46px;}
  .hero{
    font-family:var(--zh);font-weight:900;color:var(--ink);
    font-size:188px;line-height:0.96;letter-spacing:-0.02em;
  }
  .hero .l2{display:block;margin-top:6px;}
  .hero .underacc{
    position:relative;display:inline-block;
  }
  .hero .underacc::after{
    content:"";position:absolute;left:0;bottom:-14px;height:14px;width:100%;
    background:var(--accent);
  }
  .rule{width:128px;height:6px;background:var(--accent);margin:54px 0 40px;}
  .dek{
    font-size:38px;line-height:1.5;color:var(--ink-soft);font-weight:500;max-width:1180px;
  }
  .dek b{color:var(--ink);font-weight:800;}
  .dek .hl{color:var(--accent);font-weight:800;}
  .cover .en{
    font-family:var(--mono);font-size:19px;letter-spacing:0.16em;color:var(--ink-faint);
    text-transform:uppercase;margin-top:34px;
  }
  .cover .footer{border-top:2px solid var(--ink-rule);}
  .cover .footer .pageno{font-size:18px;}
</style>
</head>
<body>
<div class="slide cover">
  <div class="masthead">
    <div class="mark"><span class="sq"></span>VIN · OPEN SOURCE AIOS</div>
    <div class="meta">Architecture Review · 2026.06</div>
  </div>

  <div class="cover-body">
    <div class="kicker"><span class="sq"></span>看不見的改動 · 打地基的工程</div>
    <h1 class="hero">
      看不見的升級
      <span class="l2"><span class="underacc">一週</span>打的地基</span>
    </h1>
    <div class="rule"></div>
    <p class="dek">
      畫面上幾乎沒有新功能。但底層做了大修改——<br>
      把一個「<b>能跑起來</b>」的系統，悄悄改造成<br>
      <span class="hl">可治理、可擴充、可觀測</span>的平台底座。
    </p>
    <div class="en">An infrastructure-first review · Tool / Session / Context / Memory / Skill</div>
  </div>

  <div class="footer">
    <span>VIN · Infrastructure Review</span>
    <span class="pageno">01 / 17</span>
  </div>
</div>
</body>
</html>
