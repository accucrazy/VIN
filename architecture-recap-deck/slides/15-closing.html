<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>P17 · 收束</title>
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;}
  .closing .kicker{margin-bottom:40px;}
  .big{
    font-family:var(--zh);font-weight:900;color:var(--ink);
    font-size:104px;line-height:1.06;letter-spacing:-0.02em;
  }
  .big .underacc{position:relative;display:inline-block;}
  .big .underacc::after{content:"";position:absolute;left:0;bottom:-12px;height:13px;width:100%;background:var(--accent);}
  .rule{width:120px;height:6px;background:var(--accent);margin:46px 0 36px;}
  .sum{font-size:30px;line-height:1.55;color:var(--ink-soft);max-width:1280px;}
  .sum b{color:var(--ink);font-weight:800;}

  .next{flex:0 0 auto;display:flex;gap:24px;margin-top:54px;}
  .next .n{flex:1;border-top:2px solid var(--ink-rule);padding-top:16px;}
  .next .n .k{font-family:var(--mono);font-size:15px;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent-ink);font-weight:700;}
  .next .n .t{font-size:21px;font-weight:700;color:var(--ink);margin-top:10px;line-height:1.4;}
  .next .n .t b{color:var(--accent-ink);}

  .closing .footer{border-top:2px solid var(--ink-rule);}
</style>
</head>
<body>
<div class="slide closing">
  <div class="masthead">
    <div class="mark"><span class="sq"></span>VIN · OPEN SOURCE AIOS</div>
    <div class="meta">Closing · Architecture Review</div>
  </div>

  <div class="body">
    <div class="kicker"><span class="sq"></span>收束 · The Takeaway</div>
    <h1 class="big">看不見的升級，<br>是日後<span class="underacc">跑得快</span>的原因。</h1>
    <div class="rule"></div>
    <p class="sum">
      一週，把<b>工具、身份、脈絡、記憶、技能</b>五個地基重寫，<br>
      並畫好通往<b>平台控制中樞</b>的藍圖——這是未來開發速度的本金。
    </p>

    <div class="next">
      <div class="n">
        <div class="k">最緊急</div>
        <div class="t">Dcard 靜態 IP <b>06-26 到期前</b>更新，避免再次斷料。</div>
      </div>
      <div class="n">
        <div class="k">接著修</div>
        <div class="t">Context：<b>先修 fallback 鏈</b>，再補保護、放寬初篩。</div>
      </div>
      <div class="n">
        <div class="k">沿藍圖推進</div>
        <div class="t">往 <b>脈絡建構 / 工具管線統一</b> 落地下一塊地基。</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>Thank you · Foundations over Features</span>
    <span class="pageno">17 / 17</span>
  </div>
</div>
</body>
</html>
